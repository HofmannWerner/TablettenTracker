name: Wails Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            name: TablettenTracker-Windows-amd64.exe
            buildflags: '-tags native_webview2loader'
          - os: ubuntu-latest
            platform: linux/amd64
            name: TablettenTracker-Linux-amd64
            buildflags: '-tags webkit2_41'
          - os: macos-latest
            platform: darwin/universal
            name: TablettenTracker-Mac-Universal
            buildflags: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Wails dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential curl wget pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Wails App
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.buildflags }}

      - name: Create macOS DMG
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "TablettenTracker" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "TablettenTracker.app" 175 120 \
            --hide-extension "TablettenTracker.app" \
            --app-drop-link 425 120 \
            "build/bin/TablettenTracker-macOS.dmg" \
            "build/bin/TablettenTracker.app" || true

          if [ ! -f "build/bin/TablettenTracker-macOS.dmg" ]; then
            echo "create-dmg failed or did not produce file, falling back to hdiutil..."
            hdiutil create -volname "TablettenTracker" -srcfolder "build/bin/TablettenTracker.app" -ov -format UDZO "build/bin/TablettenTracker-macOS.dmg"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: build/bin/*

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/TablettenTracker-macOS.dmg
            build/bin/*.exe
            build/bin/TablettenTracker-Linux-amd64
